name: "tracing-be-processing"

serviceAccount:
  roleArn: "arn:aws:iam::225989375416:role/tracing-be-processing-att"

service:
  create: false

configmap:
  TRACING_STORE_DB_SCHEMA_NAME: "{{.Values.namespace}}_tracing"
  APPLICATION_NAME: "tracing-processing"
  SQS_TRACING_UPLOAD_ENDPOINT: "https://sqs.eu-south-1.amazonaws.com/225989375416/tracing-upload-att"
  SQS_PROCESSING_ERROR_ENDPOINT: "https://sqs.eu-south-1.amazonaws.com/225989375416/tracing-processing-error-att"
  CONSUMER_POLLING_TIMEOUT_IN_SECONDS: "10"
  S3_BUCKET_NAME: "tracing-files-att"
  S3_ENRICHED_BUCKET_NAME: "tracing-enriched-files-att"
  BATCH_SIZE: 500
  SQS_PROCESSING_RESULTS_ENDPOINT: "https://sqs.eu-south-1.amazonaws.com/{{.Values.local.awsAccountId}}/tracing-processing-results-{{.Values.namespace}}"
  S3_TRACING_ERRORS_BUCKET_NAME: "tracing-errors-files-{{.Values.namespace}}"

deployment:
  flywayInitContainer:
    create: true
    migrationsConfigmap: "common-flyway-tracing-schema"
    env:
      FLYWAY_CREATE_SCHEMAS: true
      FLYWAY_PLACEHOLDER_REPLACEMENT: true
      FLYWAY_PLACEHOLDERS_NAMESPACE: "att"
      FLYWAY_URL: jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
      FLYWAY_SCHEMAS: "att_tracing"
    envFromConfigmaps:
      POSTGRES_HOST: "common-tracing-store.TRACING_STORE_DB_HOST_RW"
      POSTGRES_PORT: "common-tracing-store.TRACING_STORE_DB_PORT"
      POSTGRES_DB: "common-tracing-store.TRACING_STORE_DB_NAME"
    envFromSecrets:
      FLYWAY_USER: "tracing-store-flyway-user.username"
      FLYWAY_PASSWORD: "tracing-store-flyway-user.password"

  envFromConfigmaps:
    TRACING_STORE_DB_HOST: "common-tracing-store.TRACING_STORE_DB_HOST_RO"
    TRACING_STORE_DB_NAME: "common-tracing-store.TRACING_STORE_DB_NAME"
    TRACING_STORE_DB_PORT: "common-tracing-store.TRACING_STORE_DB_PORT"
    TRACING_STORE_DB_USE_SSL: "common-tracing-store.TRACING_STORE_DB_USE_SSL"
  envFromSecrets:
    TRACING_STORE_DB_USERNAME: "tracing-store-processing-user.username"
    TRACING_STORE_DB_PASSWORD: "tracing-store-processing-user.password"
