name: "tracing-be-state-updater"

serviceAccount:
  roleArn: "arn:aws:iam::590183909663:role/tracing-be-state-updater-dev"

service:
  create: false

configmap:
  APPLICATION_NAME: "tracing-state-updater"
  TRACING_STORE_DB_SCHEMA_NAME: "dev_tracing"
  SQS_ENDPOINT_PROCESSING_ERROR_QUEUE: "https://sqs.eu-south-1.amazonaws.com/590183909663/tracing-processing-error-dev"
  SQS_ENDPOINT_ENRICHER_STATE_QUEUE: "https://sqs.eu-south-1.amazonaws.com/590183909663/tracing-enricher-state-dev"
  CONSUMER_POLLING_TIMEOUT_IN_SECONDS: "3"
  API_OPERATIONS_BASEURL: "http://tracing-be-operations.dev:8080"

deployment:
  flywayInitContainer:
    create: true
    migrationsConfigmap: "common-flyway-tracing-schema"
    env:
      FLYWAY_CREATE_SCHEMAS: true
      FLYWAY_PLACEHOLDER_REPLACEMENT: true
      FLYWAY_PLACEHOLDERS_NAMESPACE: "dev"
      FLYWAY_URL: jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
      FLYWAY_SCHEMAS: "dev_tracing"
    envFromConfigmaps:
      POSTGRES_HOST: "common-tracing-store.TRACING_STORE_DB_HOST_RW"
      POSTGRES_PORT: "common-tracing-store.TRACING_STORE_DB_PORT"
      POSTGRES_DB: "common-tracing-store.TRACING_STORE_DB_NAME"
    envFromSecrets:
      FLYWAY_USER: "tracing-store-flyway-user.username"
      FLYWAY_PASSWORD: "tracing-store-flyway-user.password"

  envFromConfigmaps:
      TRACING_STORE_DB_HOST: "common-tracing-store.TRACING_STORE_DB_HOST_RW"
      TRACING_STORE_DB_NAME: "common-tracing-store.TRACING_STORE_DB_NAME"
      TRACING_STORE_DB_PORT: "common-tracing-store.TRACING_STORE_DB_PORT"
      TRACING_STORE_DB_USE_SSL: "common-tracing-store.TRACING_STORE_DB_USE_SSL"
  envFromSecrets:
      TRACING_STORE_DB_USERNAME: "tracing-store-state-updater-user.username"
      TRACING_STORE_DB_PASSWORD: "tracing-store-state-updater-user.password"